---
name: Plugins CI
on:  # yamllint disable-line rule:truthy
  push:
    paths:
      - 'plugins/**'
      - 'tests/**'
      - '.github/workflows/ansible-test-plugins.yml'
  pull_request:
    paths:
      - 'plugins/**'
      - 'tests/**'
      - '.github/workflows/ansible-test-plugins.yml'
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  # Use this to chose which version of Python vs Ansible to test:
  # https://docs.ansible.com/ansible/latest/reference_appendices/release_and_maintenance.html#ansible-core-control-node-python-support
  integration:
    name: "Integration (Ⓐ${{ matrix.ansible }}, DB: ${{ matrix.db_engine_name }} ${{ matrix.db_engine_version }}, connector: ${{ matrix.connector_name }} ${{ matrix.connector_version }})"
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        ansible:
          - stable-2.17
          - stable-2.18
          - stable-2.19
          - stable-2.20
          - stable-2.21
          - devel
        db_engine_name:
          - mysql
          - mariadb
        db_engine_version:
          - '8.0.38'
          - '8.4.9'
          - '9.7.0'
          - '10.11.8'
          - '11.8.7'
        connector_name:
          - pymysql
        connector_version:
          - '0.9.3'
          - '1.0.2'
          - '1.1.1'

        include:

          # RHEL8 context
          - connector_name: pymysql
            connector_version: '0.10.1'
            ansible: stable-2.16
            db_engine_name: mariadb
            db_engine_version: '10.11.8'

            # RHEL9 context
            # - connector_name: pymysql
            #   connector_version: '1.1.1'
            #   ansible: stable-2.17
            #   db_engine_name: mariadb
            #   db_engine_version: '10.11.8'
            # This tests is already included in the matrix, no need repeating

        exclude:

          - db_engine_name: mysql
            db_engine_version: '10.11.8'

          - db_engine_name: mysql
            db_engine_version: '11.8.7'

          - db_engine_name: mariadb
            db_engine_version: '8.0.38'

          - db_engine_name: mariadb
            db_engine_version: '8.4.9'

          - db_engine_name: mariadb
            db_engine_version: '9.7.0'

          - db_engine_version: '8.0.38'
            ansible: stable-2.17

          - db_engine_version: '10.11.8'
            ansible: stable-2.17

          - db_engine_version: '8.0.38'
            ansible: stable-2.21

          - db_engine_version: '10.11.8'
            ansible: stable-2.21

          - db_engine_version: '8.0.38'
            ansible: devel

          - db_engine_version: '10.11.8'
            ansible: devel

          - db_engine_version: '8.4.9'
            connector_version: '2.0.1'

          - db_engine_version: '8.4.9'
            connector_version: '2.0.3'

          - db_engine_version: '10.11.8'
            connector_version: '2.0.1'

          - db_engine_version: '10.11.8'
            connector_version: '2.0.1'

    services:
      db_primary:
        image: docker.io/library/${{ matrix.db_engine_name }}:${{ matrix.db_engine_version }}
        env:
          MARIADB_ROOT_PASSWORD: msandbox
          MYSQL_ROOT_PASSWORD: msandbox
        ports:
          - 3307:3306
        # We write our own health-cmd because the mariadb container does not
        # provide a healthcheck
        options: >-
          --health-cmd "${{ matrix.db_engine_name == 'mysql' && 'mysqladmin' || 'mariadb-admin' }} ping -P 3306 -pmsandbox |grep alive || exit 1"
          --health-start-period 10s
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6

      db_replica1:
        image: docker.io/library/${{ matrix.db_engine_name }}:${{ matrix.db_engine_version }}
        env:
          MARIADB_ROOT_PASSWORD: msandbox
          MYSQL_ROOT_PASSWORD: msandbox
        ports:
          - 3308:3306
        options: >-
          --health-cmd "${{ matrix.db_engine_name == 'mysql' && 'mysqladmin' || 'mariadb-admin' }} ping -P 3306 -pmsandbox |grep alive || exit 1"
          --health-start-period 10s
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6

      db_replica2:
        image: docker.io/library/${{ matrix.db_engine_name }}:${{ matrix.db_engine_version }}
        env:
          MARIADB_ROOT_PASSWORD: msandbox
          MYSQL_ROOT_PASSWORD: msandbox
        ports:
          - 3309:3306
        options: >-
          --health-cmd "${{ matrix.db_engine_name == 'mysql' && 'mysqladmin' || 'mariadb-admin' }} ping -P 3306 -pmsandbox |grep alive || exit 1"
          --health-start-period 10s
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6

    steps:

      # No need to check for service health. GitHub Action took care of it.

      - name: Restart MySQL server with settings for replication
        run: |
          ./tests/integration/harness/generate_mysql_config.sh --server-id 1 --profile replication --db-version "${{ matrix.db_engine_version }}" \
            | docker exec -i ${{ job.services.db_primary.id }} sh -c 'cat > /etc/mysql/conf.d/replication.cnf'
          ./tests/integration/harness/generate_mysql_config.sh --server-id 2 --profile replication --db-version "${{ matrix.db_engine_version }}" \
            | docker exec -i ${{ job.services.db_replica1.id }} sh -c 'cat > /etc/mysql/conf.d/replication.cnf'
          ./tests/integration/harness/generate_mysql_config.sh --server-id 3 --profile replication --db-version "${{ matrix.db_engine_version }}" \
            | docker exec -i ${{ job.services.db_replica2.id }} sh -c 'cat > /etc/mysql/conf.d/replication.cnf'
          docker restart -t 30 ${{ job.services.db_primary.id }}
          docker restart -t 30 ${{ job.services.db_replica1.id }}
          docker restart -t 30 ${{ job.services.db_replica2.id }}

      - name: Wait for the primary to be healthy
        run: >
          while ! /usr/bin/docker inspect
          --format="{{if .Config.Healthcheck}}{{print .State.Health.Status}}{{end}}"
          ${{ job.services.db_primary.id }}
          | grep healthy && [[ "$SECONDS" -lt 120 ]]; do sleep 1; done

      - name: >-
          Perform integration testing against
          Ansible version ${{ matrix.ansible }}
        uses: ansible-community/ansible-test-gh-action@release/v1
        with:
          ansible-core-version: ${{ matrix.ansible }}
          docker-image: >-
            ${{ matrix.ansible == 'devel' && 'ubuntu2604' || 'ubuntu2204' }}
          pre-test-cmd: >-
            echo Setting db_engine_name to "${{ matrix.db_engine_name }}"...;
            echo -n "${{ matrix.db_engine_name }}"
            > tests/integration/db_engine_name;

            echo Setting db_engine_version to \
            "${{ matrix.db_engine_version }}"...;
            echo -n "${{ matrix.db_engine_version }}"
            > tests/integration/db_engine_version;

            echo Setting Connector name to "${{ matrix.connector_name }}"...;
            echo -n "${{ matrix.connector_name }}"
            > tests/integration/connector_name;

            echo Setting Connector name to "${{ matrix.connector_version }}"...;
            echo -n "${{ matrix.connector_version }}"
            > tests/integration/connector_version;

            echo Setting Ansible version to "${{ matrix.ansible }}"...;
            echo -n "${{ matrix.ansible }}"
            > tests/integration/ansible
          testing-type: integration
          integration-retry-on-error: false

  # InnoDB Cluster tests run separately because they require GTID and Group
  # Replication settings that conflict with dump/import tests.
  integration-innodb-cluster:
    name: "InnoDB Cluster (Ⓐ${{ matrix.ansible }}, MySQL ${{ matrix.db_engine_version }})"
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        ansible:
          - stable-2.17
          - stable-2.21
        db_engine_version:
          - '8.0.38'
          - '8.4.9'
        connector_name:
          - pymysql
        connector_version:
          - '1.0.2'

    services:
      db_primary:
        image: docker.io/library/mysql:${{ matrix.db_engine_version }}
        env:
          MYSQL_ROOT_PASSWORD: msandbox
        ports:
          - 3307:3306
        options: >-
          --hostname primary
          --health-cmd "mysqladmin ping -P 3306 -pmsandbox | grep alive || exit 1"
          --health-start-period 10s
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6

      db_replica1:
        image: docker.io/library/mysql:${{ matrix.db_engine_version }}
        env:
          MYSQL_ROOT_PASSWORD: msandbox
        ports:
          - 3308:3306
        options: >-
          --hostname replica1
          --health-cmd "mysqladmin ping -P 3306 -pmsandbox | grep alive || exit 1"
          --health-start-period 10s
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6

      db_replica2:
        image: docker.io/library/mysql:${{ matrix.db_engine_version }}
        env:
          MYSQL_ROOT_PASSWORD: msandbox
        ports:
          - 3309:3306
        options: >-
          --hostname replica2
          --health-cmd "mysqladmin ping -P 3306 -pmsandbox | grep alive || exit 1"
          --health-start-period 10s
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6

    steps:
      - uses: actions/checkout@v6

      - name: Configure MySQL instances for InnoDB Cluster
        run: |
          ./tests/integration/harness/generate_mysql_config.sh --server-id 1 --profile innodb_cluster --db-version "${{ matrix.db_engine_version }}" \
            | docker exec -i ${{ job.services.db_primary.id }} sh -c 'cat > /etc/mysql/conf.d/replication.cnf'
          ./tests/integration/harness/generate_mysql_config.sh --server-id 2 --profile innodb_cluster --db-version "${{ matrix.db_engine_version }}" \
            | docker exec -i ${{ job.services.db_replica1.id }} sh -c 'cat > /etc/mysql/conf.d/replication.cnf'
          ./tests/integration/harness/generate_mysql_config.sh --server-id 3 --profile innodb_cluster --db-version "${{ matrix.db_engine_version }}" \
            | docker exec -i ${{ job.services.db_replica2.id }} sh -c 'cat > /etc/mysql/conf.d/replication.cnf'
          docker restart ${{ job.services.db_primary.id }}
          docker restart ${{ job.services.db_replica1.id }}
          docker restart ${{ job.services.db_replica2.id }}

      - name: Wait for primary to be healthy after restart
        run: >
          while ! /usr/bin/docker inspect
          --format="{{if .Config.Healthcheck}}{{print .State.Health.Status}}{{end}}"
          ${{ job.services.db_primary.id }}
          | grep healthy && [[ "$SECONDS" -lt 120 ]]; do sleep 1; done

      - name: >-
          Run InnoDB Cluster integration tests against
          Ansible version ${{ matrix.ansible }}
        uses: ansible-community/ansible-test-gh-action@release/v1
        with:
          ansible-core-version: ${{ matrix.ansible }}
          docker-image: >-
            ${{ matrix.ansible == 'devel' && 'ubuntu2604' || 'ubuntu2204' }}
          pre-test-cmd: |-
            PRIMARY_IP=$(docker inspect ${{ job.services.db_primary.id }} --format '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}')
            REPLICA1_IP=$(docker inspect ${{ job.services.db_replica1.id }} --format '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}')
            REPLICA2_IP=$(docker inspect ${{ job.services.db_replica2.id }} --format '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}')
            mkdir -p tests/integration
            printf '%s' "$PRIMARY_IP" > tests/integration/primary_ip
            printf '%s' "$REPLICA1_IP" > tests/integration/replica1_ip
            printf '%s' "$REPLICA2_IP" > tests/integration/replica2_ip
            printf '%s\n%s\n%s\n' \
              "$PRIMARY_IP primary" \
              "$REPLICA1_IP replica1" \
              "$REPLICA2_IP replica2" \
              | docker exec -i ${{ job.services.db_primary.id }} sh -c 'cat >> /etc/hosts'
            printf '%s\n%s\n%s\n' \
              "$PRIMARY_IP primary" \
              "$REPLICA1_IP replica1" \
              "$REPLICA2_IP replica2" \
              | docker exec -i ${{ job.services.db_replica1.id }} sh -c 'cat >> /etc/hosts'
            printf '%s\n%s\n%s\n' \
              "$PRIMARY_IP primary" \
              "$REPLICA1_IP replica1" \
              "$REPLICA2_IP replica2" \
              | docker exec -i ${{ job.services.db_replica2.id }} sh -c 'cat >> /etc/hosts'
            echo -n "mysql" > tests/integration/db_engine_name
            echo -n "${{ matrix.db_engine_version }}" > tests/integration/db_engine_version
            echo -n "${{ matrix.connector_name }}" > tests/integration/connector_name
            echo -n "${{ matrix.connector_version }}" > tests/integration/connector_version
            echo -n "${{ matrix.ansible }}" > tests/integration/ansible
          target: test_mysql_innodb_cluster
          testing-type: integration
          integration-retry-on-error: false
