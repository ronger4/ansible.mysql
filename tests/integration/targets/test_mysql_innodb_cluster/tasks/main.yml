---
# InnoDB Cluster integration tests
# Run via: make test-integration-innodb-cluster (dedicated Makefile target)
# This target guarantees GTID and GR prerequisites are configured.
# Tests only run on MySQL (not MariaDB).

- name: Skip tests if not MySQL
  when: db_engine is defined and db_engine != 'mysql'
  ansible.builtin.debug:
    msg: "Skipping InnoDB Cluster tests - only supported on MySQL"

- name: Check if running via dedicated innodb-cluster target
  ansible.builtin.set_fact:
    innodb_cluster_primary_ip: >-
      {{
        lookup(
          'file',
          '/root/ansible_collections/ansible/mysql/tests/integration/primary_ip',
          errors='ignore'
        ) | default('', true) | trim
      }}

- name: Skip if not running via dedicated target
  when: innodb_cluster_primary_ip | length == 0
  ansible.builtin.debug:
    msg: >-
      Skipping InnoDB Cluster tests - not running via dedicated target.
      Use: make test-integration-innodb-cluster

- name: Run InnoDB Cluster tests
  when:
    - db_engine is not defined or db_engine == 'mysql'
    - innodb_cluster_primary_ip | length > 0
  block:
    - name: Read container IPs from dedicated target files
      ansible.builtin.set_fact:
        mysql_primary_host: "{{ lookup('file', '/root/ansible_collections/ansible/mysql/tests/integration/primary_ip') | trim }}"
        mysql_replica1_host: "{{ lookup('file', '/root/ansible_collections/ansible/mysql/tests/integration/replica1_ip') | trim }}"
        mysql_replica2_host: "{{ lookup('file', '/root/ansible_collections/ansible/mysql/tests/integration/replica2_ip') | trim }}"

    - name: Check if mysqlsh is already installed
      ansible.builtin.command: mysqlsh --version
      changed_when: false
      failed_when: false
      register: mysqlsh_check

    - name: Decide whether mysqlsh installation or upgrade is needed
      ansible.builtin.set_fact:
        mysqlsh_needs_install: >-
          {{
            mysqlsh_check.rc != 0 or
            (
              db_version is version('8.4', '>=')
              and not (mysqlsh_check.stdout is search('Ver (8\\.4|9\\.)'))
            )
          }}

    - name: Install mysql-shell if not present
      when: mysqlsh_needs_install
      block:
        - name: Add MySQL GPG key
          ansible.builtin.copy:
            src: "{{ role_path }}/../setup_controller/files/mysql_pubkey.asc"
            dest: /etc/apt/trusted.gpg.d/mysql.asc
            owner: root
            group: root
            mode: '0644'

        - name: Install python3-debian for deb822_repository module
          ansible.builtin.apt:
            name: python3-debian
            state: present

        - name: Add MySQL repository for the required Shell version
          ansible.builtin.deb822_repository:
            name: mysql
            types: deb
            uris: http://repo.mysql.com/apt/ubuntu
            suites: jammy
            components:
              - "{{ db_version is version('8.4', '>=') | ternary('mysql-8.4-lts', 'mysql-8.0') }}"
            signed_by: /etc/apt/trusted.gpg.d/mysql.asc
            state: present

        - name: Install mysql-shell
          ansible.builtin.apt:
            name: mysql-shell
            state: present
            update_cache: true

    - name: Verify mysqlsh is available
      ansible.builtin.command:
        cmd: mysqlsh --version
        chdir: /tmp
      changed_when: false
      register: mysqlsh_version

    - name: Display mysqlsh version
      ansible.builtin.debug:
        msg: "{{ mysqlsh_version.stdout }}"

    - name: Add container hostnames to /etc/hosts for cluster member resolution
      ansible.builtin.shell:
        cmd: |
          echo "{{ mysql_primary_host }} primary" >> /etc/hosts
          echo "{{ mysql_replica1_host }} replica1" >> /etc/hosts
          echo "{{ mysql_replica2_host }} replica2" >> /etc/hosts
      changed_when: true

    - name: Configure instances for InnoDB Cluster with mysqlsh
      ansible.builtin.command: >-
        mysqlsh {{ mysql_user }}@{{ item.host }}:{{ item.port }}
        --password={{ mysql_password }}
        --no-wizard -- dba configure-instance --restart=true
      args:
        chdir: /tmp
      loop:
        - { host: "{{ mysql_primary_host }}", port: "{{ mysql_primary_port }}" }
        - { host: "{{ mysql_replica1_host }}", port: "{{ mysql_replica1_port }}" }
        - { host: "{{ mysql_replica2_host }}", port: "{{ mysql_replica2_port }}" }
      loop_control:
        label: "{{ item.host }}:{{ item.port }}"
      register: configure_instances_result
      changed_when: true

    - name: Wait for configured instances to restart
      ansible.builtin.wait_for:
        host: "{{ item.host }}"
        port: "{{ item.port }}"
        timeout: 60
      loop:
        - { host: "{{ mysql_primary_host }}", port: "{{ mysql_primary_port }}" }
        - { host: "{{ mysql_replica1_host }}", port: "{{ mysql_replica1_port }}" }
        - { host: "{{ mysql_replica2_host }}", port: "{{ mysql_replica2_port }}" }
      loop_control:
        label: "{{ item.host }}:{{ item.port }}"

    - name: Include cluster lifecycle tests
      ansible.builtin.include_tasks: test_cluster_lifecycle.yml
